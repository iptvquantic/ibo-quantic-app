name: Build IBO QUANTIC APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download app source
        run: |
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/source/app_source.tar.gz \
            -o app_source.tar.gz
          tar -xzf app_source.tar.gz
          echo "Files extracted:"
          ls -la
          ls app/ || echo "no app dir"

      - name: Setup Gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          printf 'distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-8.4-bin.zip\nnetworkTimeout=10000\nvalidateDistributionUrl=true\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\n' > gradle/wrapper/gradle-wrapper.properties
          curl -fsSL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          echo "Gradle wrapper ready:"
          ls -la gradle/wrapper/

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK components
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk IBO_QUANTIC.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: IBO_QUANTIC_APK
          path: IBO_QUANTIC.apk
          retention-days: 30
